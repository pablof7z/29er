[workspace]
resolver = "2"
members = ["crates/shakeout", "crates/nmp-app-29er", "crates/29er-tui"]

[workspace.package]
edition = "2021"
license = "MIT"
repository = "https://github.com/pablof7z/29er"
version = "0.1.0"

# NMP is consumed as an external git dependency — never vendored.
# Pinned to master HEAD ac69c0fb7 (clean-break architecture):
#   * nmp-ffi DELETED (#2483) -> nmp-native-runtime (NmpApp impl) + nmp-uniffi (UniFFI surface).
#   * register_defaults() killed as a production path (ADR-0069) -> explicit composition.
#   * typed read sessions (ADR-0070); raw ObservedProjection/open_interest crate-private.
#   * typed actions + publish provenance (ADR-0071) via dispatch_action(Vec<u8>) byte lane.
[workspace.dependencies]
nmp-core = { git = "ssh://git@github.com/pablof7z/nostr-multi-platform.git", rev = "ac69c0fb7d64cd6e0af3637a66aa055b6699b42d" }
nmp-native-runtime = { git = "ssh://git@github.com/pablof7z/nostr-multi-platform.git", rev = "ac69c0fb7d64cd6e0af3637a66aa055b6699b42d" }
nmp-uniffi = { git = "ssh://git@github.com/pablof7z/nostr-multi-platform.git", rev = "ac69c0fb7d64cd6e0af3637a66aa055b6699b42d" }
nmp-defaults = { git = "ssh://git@github.com/pablof7z/nostr-multi-platform.git", rev = "ac69c0fb7d64cd6e0af3637a66aa055b6699b42d" }
nmp-nip29 = { git = "ssh://git@github.com/pablof7z/nostr-multi-platform.git", rev = "ac69c0fb7d64cd6e0af3637a66aa055b6699b42d" }
nmp-planner = { git = "ssh://git@github.com/pablof7z/nostr-multi-platform.git", rev = "ac69c0fb7d64cd6e0af3637a66aa055b6699b42d" }
nmp-network = { git = "ssh://git@github.com/pablof7z/nostr-multi-platform.git", rev = "ac69c0fb7d64cd6e0af3637a66aa055b6699b42d" }
nmp-signer-iface = { git = "ssh://git@github.com/pablof7z/nostr-multi-platform.git", rev = "ac69c0fb7d64cd6e0af3637a66aa055b6699b42d" }
nmp-content = { git = "ssh://git@github.com/pablof7z/nostr-multi-platform.git", rev = "ac69c0fb7d64cd6e0af3637a66aa055b6699b42d" }
nmp-app-29er = { path = "crates/nmp-app-29er" }
flatbuffers = "25.12.19"
nostr = "0.44"
serde = "1.0"
serde_json = "1.0"

[profile.dev]
debug = "line-tables-only"

[profile.test]
debug = "line-tables-only"
