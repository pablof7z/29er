name: 29er
options:
  bundleIdPrefix: io.f7z
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    GENERATE_INFOPLIST_FILE: NO
    CODE_SIGN_STYLE: Automatic
packages:
  FlatBuffers:
    url: https://github.com/google/flatbuffers.git
    from: 25.12.19
targets:
  29er:
    type: application
    platform: iOS
    sources:
      - path: 29er
    dependencies:
      - package: FlatBuffers
    preBuildScripts:
      - name: "Force static Rust link (strip stray dylib)"
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          # `cargo build --target aarch64-apple-ios[-sim]` always emits BOTH
          # libnmp_app_29er.a and libnmp_app_29er.dylib into the same target
          # dir (crate-type = ["lib", "cdylib", "staticlib"] — the cdylib is
          # needed by uniffi-bindgen; see scripts/check-uniffi-bindings-drift.sh).
          # ld64 prefers a same-directory dylib over an archive for `-lname`,
          # so leaving the dylib in place silently links the app dynamically
          # against a Mac-only build path baked in at link time. The
          # simulator shares the Mac filesystem so that path still resolves
          # and the app runs fine — but on a real device that path doesn't
          # exist (and isn't embedded in the app bundle), so the app builds
          # and installs, then crashes at launch with
          # `dyld: Library not loaded: .../target/.../libnmp_app_29er.dylib`.
          # Deleting the dylib before the link phase leaves only the archive
          # in each search dir, so `-lnmp_app_29er` resolves to the static
          # lib deterministically on both device and simulator. The
          # xcframework fallback is unaffected — it only ever wraps the
          # archive (scripts/build-nmp-xcframework.sh).
          for dir in \
              "${SRCROOT}/../../target/aarch64-apple-ios/debug" \
              "${SRCROOT}/../../target/aarch64-apple-ios/release" \
              "${SRCROOT}/../../target/aarch64-apple-ios-sim/debug" \
              "${SRCROOT}/../../target/aarch64-apple-ios-sim/release"; do
              rm -f "${dir}/libnmp_app_29er.dylib"
          done
    info:
      path: 29er/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        CFBundleDisplayName: 29er
        UIApplicationSupportsIndirectInputEvents: true
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        LSApplicationQueriesSchemes:
          - nostrsigner
          - primal
          - nostrconnect
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29er
        PRODUCT_MODULE_NAME: App29er
        PRODUCT_NAME: 29er
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        # UniFFI Swift integration: the bridging header points directly at
        # the generated FFI header (Bridge/Generated/nmp_app_29erFFI.h)
        # instead of an app-maintained header. UniFFI's Swift codegen
        # conditionally `import`s a separate `nmp_app_29erFFI` Clang module
        # from the generated .swift file when one is available
        # (`#if canImport(nmp_app_29erFFI)`); this project does not declare
        # that as a second xcodegen/SPM module, so the conditional import is
        # skipped and the FFI declarations are made visible to Swift via the
        # bridging header instead — the lower-risk choice given this project
        # already used a bridging-header + static-lib-link pattern. Generated
        # files (this header, its .modulemap, and nmp_app_29er.swift) are
        # produced by `crates/nmp-app-29er`'s `uniffi-bindgen` binary; never
        # hand-edit, regenerate with `scripts/check-uniffi-bindings-drift.sh
        # --regen`.
        SWIFT_OBJC_BRIDGING_HEADER: 29er/Bridge/Generated/nmp_app_29erFFI.h
        CODE_SIGN_ENTITLEMENTS: 29er/29er.entitlements
        DEVELOPMENT_TEAM: 456SHKPP26
        # 29er links one aggregate Rust archive (`-lnmp_app_29er`) that
        # contains nmp-core, nmp-native-runtime, and the 29er per-app UniFFI
        # facade.
        # The xcframework wraps the staticlib; the link happens via
        # LIBRARY_SEARCH_PATHS pointing at the xcframework slice (mirrors
        # Chirp's `LIBRARY_SEARCH_PATHS` pointing at `target/.../debug`).
        # NmpApp29er.xcframework is gitignored and not checked in; it is only
        # produced locally by `scripts/build-nmp-xcframework.sh` for
        # consumers without a Rust toolchain. The `target/aarch64-apple-ios*`
        # search-path entries below are where plain `cargo build --target
        # ...` runs land and are sufficient for day-to-day iOS development —
        # both fallbacks are kept. Those plain cargo dirs also contain a
        # sibling `libnmp_app_29er.dylib` (cargo builds cdylib + staticlib
        # together); the "Force static Rust link" preBuildScript on this
        # target strips it before every build so `-lnmp_app_29er` can only
        # resolve to the archive — otherwise ld64 prefers the co-located
        # dylib, which links fine in the simulator (same Mac filesystem) but
        # crashes at launch on-device (dyld can't find the Mac-only build
        # path baked into the binary).
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]":
          - $(SRCROOT)/Vendor/NmpApp29er.xcframework/ios-arm64
          - $(SRCROOT)/../../target/aarch64-apple-ios/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios/release
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]":
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/release
          - $(SRCROOT)/Vendor/NmpApp29er.xcframework/ios-arm64-simulator
        OTHER_LDFLAGS: "$(inherited) -lnmp_app_29er"
        # The NmpApp29er.xcframework ships arm64 simulator + arm64 device slices
        # only (matches the Rust iOS build targets). Restrict the simulator
        # build to arm64 so the linker does not look for an x86_64 slice that
        # was never built. CI / local simulators on Apple Silicon cover this;
        # Intel Macs would need an x86_64 sim slice added to the xcframework.
        ARCHS[sdk=iphonesimulator*]: arm64
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # Xcode 26 beta workarounds (mirrors Chirp's project.yml):
        # 1. SwiftUICore restricts allowable-clients in its SDK TBD; the debug
        #    dylib mode hits the same restriction. Disable the debug dylib so
        #    the linker targets the real executable, and point FRAMEWORK_SEARCH_PATHS
        #    at /tmp/LocalFrameworks first — that directory holds a copy of
        #    the SwiftUICore.tbd with the allowable-clients block removed.
        # 2. UIUtilities is a new private framework auto-linked in Xcode 26; a
        #    stub TBD lives in the same /tmp/LocalFrameworks directory.
        # Both stubs must exist before building; see
        # upstream NMP ios/Chirp/project.yml for the reference settings.
        ENABLE_DEBUG_DYLIB: NO
        "FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]": "/tmp/LocalFrameworks $(inherited)"
  probe:
    type: application
    platform: iOS
    sources:
      - path: probe
      - path: 29er/Bridge/Generated
      - path: 29er/Bridge/KernelUpdateFrameDecoder.swift
      - path: 29er/Capabilities
    dependencies:
      - package: FlatBuffers
    preBuildScripts:
      - name: "Force static Rust link (strip stray dylib)"
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          # See the identical phase on the `29er` target for the full
          # explanation: strips the cdylib cargo always emits alongside the
          # staticlib so `-lnmp_app_29er` can't resolve to it.
          for dir in \
              "${SRCROOT}/../../target/aarch64-apple-ios/debug" \
              "${SRCROOT}/../../target/aarch64-apple-ios/release" \
              "${SRCROOT}/../../target/aarch64-apple-ios-sim/debug" \
              "${SRCROOT}/../../target/aarch64-apple-ios-sim/release"; do
              rm -f "${dir}/libnmp_app_29er.dylib"
          done
    info:
      path: probe/Info.plist
      properties:
        CFBundleDisplayName: probe
        UIApplicationExitsOnSuspend: true
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29erProbe
        PRODUCT_MODULE_NAME: App29erProbe
        PRODUCT_NAME: probe
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_OBJC_BRIDGING_HEADER: 29er/Bridge/Generated/nmp_app_29erFFI.h
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]":
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/debug
          - $(SRCROOT)/../../target/aarch64-apple-ios-sim/release
          - $(SRCROOT)/Vendor/NmpApp29er.xcframework/ios-arm64-simulator
        OTHER_LDFLAGS: "$(inherited) -lnmp_app_29er"
        ARCHS[sdk=iphonesimulator*]: arm64
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ENABLE_DEBUG_DYLIB: NO
        "FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]": "/tmp/LocalFrameworks $(inherited)"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        SWIFT_VERSION: "6.0"
  29erUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: 29erUITests
    dependencies:
      - target: 29er
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.f7z.app29erUITests
        PRODUCT_NAME: 29erUITests
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 456SHKPP26
        TEST_TARGET_NAME: 29er
        SWIFT_VERSION: "5.0"
schemes:
  29er:
    build:
      targets:
        29er: all
        29erUITests: [test]
    test:
      targets:
        - 29erUITests
  probe:
    build:
      targets:
        probe: all
